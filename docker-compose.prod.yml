services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${STUDY_POSTGRES_DB:-study}
      POSTGRES_USER: ${STUDY_POSTGRES_USER:-study}
      POSTGRES_PASSWORD: ${STUDY_POSTGRES_PASSWORD:?Set STUDY_POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STUDY_POSTGRES_USER:-study} -d ${STUDY_POSTGRES_DB:-study}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ${DEVMEMORY_ENV_FILE:-.env.production}
    environment:
      STUDY_DATABASE_URL: postgresql+psycopg://${STUDY_POSTGRES_USER:-study}:${STUDY_POSTGRES_PASSWORD:?Set STUDY_POSTGRES_PASSWORD in .env.production}@postgres:5432/${STUDY_POSTGRES_DB:-study}
      STUDY_UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    env_file: ${DEVMEMORY_ENV_FILE:-.env.production}
    environment:
      STUDY_DATABASE_URL: postgresql+psycopg://${STUDY_POSTGRES_USER:-study}:${STUDY_POSTGRES_PASSWORD:?Set STUDY_POSTGRES_PASSWORD in .env.production}@postgres:5432/${STUDY_POSTGRES_DB:-study}
      STUDY_UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
